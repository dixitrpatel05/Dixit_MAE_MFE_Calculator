services:
  - type: web
    name: mae-mfe-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DATABASE_URL
        value: sqlite:////var/data/trades.db
    disk:
      name: mae-mfe-sqlite-data
      mountPath: /var/data
      sizeGB: 1
